version: "3.9"

# WSL Docker 基础设施：PostgreSQL + Redis + Ollama + Celery Worker
# FastAPI 和前端在 Windows 本机运行，通过 localhost 连接这些服务

services:
  postgres:
    image: postgres:16-alpine
    container_name: a3d-postgres
    environment:
      POSTGRES_USER: a3d
      POSTGRES_PASSWORD: a3d_secret
      POSTGRES_DB: a3d_assets
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U a3d -d a3d_assets"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: a3d-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: a3d-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollamadata:/root/.ollama
    restart: unless-stopped

  worker:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: a3d-worker
    env_file: ./server/.env
    environment:
      # 容器内用服务名互访，覆盖 .env 的 localhost
      - PYTHONPATH=/app
      - HF_ENDPOINT=https://hf-mirror.com
      - DATA_DIR=/app/data
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
      - OLLAMA_HOST=http://ollama:11434
    volumes:
      - ./server:/app
      - asset_data:/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A celery_worker worker --loglevel=info --concurrency=2
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  ollamadata:
  asset_data:
