version: "3.9"

services:
  # ========== 基础设施 ==========
  postgres:
    image: postgres:16-alpine
    container_name: a3d-postgres
    environment:
      POSTGRES_USER: a3d
      POSTGRES_PASSWORD: a3d_secret
      POSTGRES_DB: a3d_assets
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U a3d -d a3d_assets"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: a3d-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ========== LLM 推理服务 ==========
  ollama:
    image: ollama/ollama:latest
    container_name: a3d-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollamadata:/root/.ollama
    deploy:
      resources:
        reservations:
          memory: 8G
    restart: unless-stopped

  # ========== 后端 API ==========
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: a3d-api
    env_file:
      - ./server/.env
    ports:
      - "8000:8000"
    volumes:
      - ./server:/app
      - asset_data:/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_started
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  # ========== Celery Worker ==========
  worker:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: a3d-worker
    env_file:
      - ./server/.env
    volumes:
      - ./server:/app
      - asset_data:/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A celery_worker worker --loglevel=info --concurrency=2
    restart: unless-stopped

  # ========== 前端开发服务器 ==========
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: a3d-web
    ports:
      - "5173:5173"
    volumes:
      - ./web:/app
      - /app/node_modules
    depends_on:
      - api
    command: pnpm dev

  # ========== 反向代理 (生产部署用) ==========
  nginx:
    image: nginx:alpine
    container_name: a3d-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./web/dist:/usr/share/nginx/html:ro
    depends_on:
      - api
    profiles:
      - production

volumes:
  pgdata:
  redisdata:
  ollamadata:
  asset_data:
